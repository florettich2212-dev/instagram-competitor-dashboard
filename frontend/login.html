<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Leoniie Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      width: 360px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.07);
      text-align: center;
    }

    .logo {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #86868b;
      margin-bottom: 28px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    p.sub {
      font-size: 14px;
      color: #6e6e73;
      margin-bottom: 32px;
    }

    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid rgba(0,0,0,0.1);
      border-radius: 12px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 14px;
      background: #fafafa;
    }

    input[type="password"]:focus {
      border-color: #1d1d1f;
      background: #fff;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #1d1d1f;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }

    .error {
      color: #ff3b30;
      font-size: 13px;
      margin-top: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">lamaisondeleoniie</div>
    <h1>Dashboard</h1>
    <p class="sub">Enter your password to continue</p>
    <form method="POST" action="/login">
      <input type="password" name="password" placeholder="Password" autofocus autocomplete="current-password" />
      <button type="submit">Sign In</button>
      <!--ERROR-->
    </form>
  </div>
</body>
</html>
